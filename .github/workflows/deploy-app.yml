# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Package clab-terminal-launcher

on:
  pull_request:
    types:
      - closed
    branches: [ "main" ]

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'newversion') && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: pypi
  
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up the project Python version
      uses: actions/setup-python@v6
      with:
        python-version-file: "pyproject.toml"

    - name: Install Astral uv
      uses: astral-sh/setup-uv@v7

    - name: Install and Lint with Ruff
      uses: astral-sh/ruff-action@v3

    - name: Publish to PyPI
      run: uv publish
